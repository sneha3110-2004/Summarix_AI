<!DOCTYPE html>
<html lang="en" data-theme="dark">

    <title>Login | SUMMaRIX AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card glass">
        <div class="brand-auth">Σ <span>SUMMaRIX AI</span></div>
        <h2>Portal Login</h2>
        <form method="POST">
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>

                <input type="password" name="password" placeholder="Password" required>

            <button type="submit" class="btn-glow">Initialize Engine</button>
        </form>
        <p style="margin-top:20px; font-size:0.9rem;">
            New Researcher? <a href="{{ url_for('signup') }}" style="color:var(--neon-blue);">Sign Up</a>
        </p>
    </div>
</body>
</html>
