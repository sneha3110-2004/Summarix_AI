<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Neural Dashboard | SUMMaRIX AI</title>
    <link rel="icon" href="data:,">
    <style>
        :root[data-theme="dark"] { --bg: #0a0a0c; --glass: rgba(255,255,255,0.05); --accent: #00d2ff; --text: #fff; }
        :root[data-theme="light"] { --bg: #f0f2f5; --glass: rgba(0,0,0,0.05); --accent: #3a7bd5; --text: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; transition: 0.3s; }
        .dashboard-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; padding: 2rem; border-right: 1px solid rgba(255,255,255,0.1); background: var(--glass); backdrop-filter: blur(10px); }
        .content { flex: 1; padding: 3rem; max-width: 1200px; margin: 0 auto; }
        .glass-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 1.5rem; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: 8px; cursor: pointer; border: none; font-weight: 600; }
        .btn-accent { background: var(--accent); color: #000; }
        .btn-danger { background: rgba(255,77,77,0.1); color: #ff4d4d; border: 1px solid #ff4d4d; margin-top: 10px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
        .preview-box { background: rgba(0,210,255,0.05); border: 1px dashed var(--accent); padding: 20px; border-radius: 12px; margin-bottom: 30px; display: none; text-align: center; }
        .chat-display { height: 100px; overflow-y: auto; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 5px; }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <h2 style="color: var(--accent);">Σ SUMMaRIX</h2>
            <p>Researcher: <b>{{ name }}</b></p>
            <button class="btn btn-accent" onclick="toggleTheme()" style="width: 100%;">🌓 Switch Theme</button>
            <button class="btn btn-danger" onclick="clearHistory()" style="width: 100%;">🗑️ Clear History</button>
            <div style="margin-top: 2rem;"><a href="{{ url_for('logout') }}" style="color: var(--text); text-decoration: none; opacity: 0.6;">Logout</a></div>
        </aside>

        <main class="content">
            <div id="uploadZone" style="text-align: center; margin-bottom: 30px;">
                <input type="file" id="pdfInput" hidden onchange="showPreview()">
                <label for="pdfInput" class="btn btn-accent" style="display: inline-block;">＋ Select Research PDF</label>
            </div>

            <div id="previewBox" class="preview-box">
                <p>Selected: <b id="fileNameText"></b></p>
                <button class="btn btn-accent" id="analyzeBtn" onclick="processFile()">🚀 Start Analysis</button>
                <button class="btn btn-danger" onclick="cancelUpload()">Cancel</button>
            </div>

            <div class="card-grid">
                {% for paper in history %}
                <div class="glass-card">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h3 style="margin: 0; font-size: 1rem;">{{ paper.filename }}</h3>
                        <div style="display: flex; gap: 10px;">
                            <button onclick="copyToClipboard('{{ paper.summary | replace("'", "\\'") | replace("\n", " ") }}')" style="background:none; border:none; cursor:pointer;">📋</button>
                            <a href="/download/{{ paper.id }}" style="text-decoration: none;">📥</a>
                        </div>
                    </div>
                    <p style="font-size: 0.85rem; opacity: 0.8; margin: 15px 0;">{{ paper.summary }}</p>
                    
                    <div style="background: rgba(0,0,0,0.2); border-radius: 8px; padding: 10px;">
                        <div class="chat-display" id="chat-{{ paper.id }}"><p style="opacity: 0.3;"><i>Neural thread ready...</i></p></div>
                        <input type="text" placeholder="Query paper..." onkeydown="handleChat(event, {{ paper.id }})" style="width: 100%; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 5px; border-radius: 4px; box-sizing: border-box; margin-top: 5px;">
                    </div>
                </div>
                {% endfor %}
            </div>
        </main>
    </div>

    <script>
        function toggleTheme() {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');

        function showPreview() {
            const file = document.getElementById('pdfInput').files[0];
            if (file) {
                document.getElementById('fileNameText').innerText = file.name;
                document.getElementById('previewBox').style.display = 'block';
                document.getElementById('uploadZone').style.display = 'none';
            }
        }

        function cancelUpload() {
            document.getElementById('pdfInput').value = "";
            document.getElementById('previewBox').style.display = 'none';
            document.getElementById('uploadZone').style.display = 'block';
        }

        async function processFile() {
            const btn = document.getElementById('analyzeBtn');
            btn.innerText = "Analyzing..."; btn.disabled = true;
            const formData = new FormData();
            formData.append('file', document.getElementById('pdfInput').files[0]);
            const res = await fetch('/upload', { method: 'POST', body: formData });
            if (res.ok) window.location.reload();
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => alert("Summary Copied!"));
        }

        async function handleChat(event, paperId) {
            if (event.key === 'Enter') {
                const q = event.target.value;
                const display = document.getElementById(`chat-${paperId}`);
                display.innerHTML += `<p><b>You:</b> ${q}</p>`;
                event.target.value = '';
                const res = await fetch('/chat_query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paper_id: paperId, question: q })
                });
                const data = await res.json();
                display.innerHTML += `<p style="color: var(--accent);"><b>AI:</b> ${data.answer}</p>`;
                display.scrollTop = display.scrollHeight;
            }
        }

        async function clearHistory() {
            if(confirm("Delete all history?")) {
                const res = await fetch('/clear_history', { method: 'POST' });
                if (res.ok) window.location.reload();
            }
        }
    </script>
</body>
</html>
