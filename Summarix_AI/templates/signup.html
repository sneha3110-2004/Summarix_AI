<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Researcher Registration | SUMMaRIX AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card glass">
        <div class="brand-auth">Σ <span>SUMMaRIX AI</span></div>
        <h2>Create Research Profile</h2>
        <p>Register to begin your 5-month neural analysis plan.</p>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert-error">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('signup') }}">
            <div class="input-group">
                <input type="text" name="username" placeholder="Choose Username" required>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Secure Password" required>
            </div>
            <button type="submit" class="btn-glow">Register Account</button>
        </form>
        
        <div class="auth-footer" style="margin-top: 20px;">
            <p>Already a researcher? <a href="{{ url_for('login') }}" style="color: var(--neon-blue);">Sign In</a></p>
        </div>
    </div>
</body>
</html>
